name: Deploy discord-overlord to Mac Mini

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DOCKER_ADMIN_ROLE_ID: ${{ secrets.DOCKER_ADMIN_ROLE_ID }}
          WORKLOG_ROLE_ID: ${{ secrets.WORKLOG_ROLE_ID }}
          ALERTS_CHANNEL_ID: ${{ secrets.ALERTS_CHANNEL_ID }}
          WORKLOG_API_URL: ${{ secrets.WORKLOG_API_URL }}
          WORKLOG_API_KEY: ${{ secrets.WORKLOG_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_CHANNEL_ID: ${{ secrets.AI_CHANNEL_ID }}
          AI_USER_ID: ${{ secrets.AI_USER_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WEBHOOK_PORT: ${{ secrets.WEBHOOK_PORT }}
          N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DISCORD_TOKEN,DISCORD_GUILD_ID,DISCORD_CLIENT_ID,DOCKER_ADMIN_ROLE_ID,WORKLOG_ROLE_ID,ALERTS_CHANNEL_ID,WORKLOG_API_URL,WORKLOG_API_KEY,GEMINI_API_KEY,AI_CHANNEL_ID,AI_USER_ID,DATABASE_URL,WEBHOOK_PORT,N8N_WEBHOOK_SECRET,PAT_TOKEN
          script: |
            export PATH=$PATH:/usr/local/bin:/opt/homebrew/bin:~/.docker/bin

            cd /Users/fu/Project/discord-overlord

            git pull "https://x-access-token:${PAT_TOKEN}@github.com/FuuFu-Home-Server/discord-overlord.git" main

            printf 'DISCORD_TOKEN=%s\nDISCORD_GUILD_ID=%s\nDISCORD_CLIENT_ID=%s\nDOCKER_ADMIN_ROLE_ID=%s\nWORKLOG_ROLE_ID=%s\nALERTS_CHANNEL_ID=%s\nWORKLOG_API_URL=%s\nWORKLOG_API_KEY=%s\nGEMINI_API_KEY=%s\nAI_CHANNEL_ID=%s\nAI_USER_ID=%s\nDATABASE_URL=%s\nWEBHOOK_PORT=%s\nN8N_WEBHOOK_SECRET=%s\n' \
              "$DISCORD_TOKEN" "$DISCORD_GUILD_ID" "$DISCORD_CLIENT_ID" "$DOCKER_ADMIN_ROLE_ID" "$WORKLOG_ROLE_ID" "$ALERTS_CHANNEL_ID" "$WORKLOG_API_URL" "$WORKLOG_API_KEY" "$GEMINI_API_KEY" "$AI_CHANNEL_ID" "$AI_USER_ID" "$DATABASE_URL" "$WEBHOOK_PORT" "$N8N_WEBHOOK_SECRET" > .env

            docker compose up -d --build
